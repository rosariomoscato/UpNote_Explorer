  <circle cx="640" cy="260" r="5" fill="#2ecc71" opacity="0.6"/>
  <circle cx="600" cy="340" r="5" fill="#2ecc71" opacity="0.6"/>
  
  <!-- IA notes -->
  <circle cx="740" cy="250" r="6" fill="#3498db" opacity="0.7"/>
  <circle cx="820" cy="260" r="6" fill="#3498db" opacity="0.7"/>
  <circle cx="860" cy="340" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="700" cy="360" r="5" fill="#3498db" opacity="0.6"/>
  
