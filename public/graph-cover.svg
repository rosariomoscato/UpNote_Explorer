<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b1a"/>
      <stop offset="30%" style="stop-color:#0f0c29"/>
      <stop offset="60%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Stars -->
  <circle cx="50" cy="80" r="1" fill="#818cf8" opacity="0.5"/>
  <circle cx="150" cy="45" r="0.8" fill="#22d3ee" opacity="0.4"/>
  <circle cx="280" cy="120" r="1.2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="400" cy="60" r="0.7" fill="#818cf8" opacity="0.6"/>
  <circle cx="520" cy="100" r="1" fill="#22d3ee" opacity="0.35"/>
  <circle cx="680" cy="50" r="0.9" fill="#a78bfa" opacity="0.5"/>
  <circle cx="800" cy="90" r="1.1" fill="#818cf8" opacity="0.4"/>
