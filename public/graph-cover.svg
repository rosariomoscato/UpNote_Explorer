  <circle cx="920" cy="260" r="5" fill="#9b59b6" opacity="0.6"/>
  <circle cx="1000" cy="270" r="5" fill="#9b59b6" opacity="0.6"/>
  
  <!-- Riflessioni notes -->
  <circle cx="200" cy="530" r="5" fill="#1abc9c" opacity="0.6"/>
  <circle cx="350" cy="540" r="5" fill="#1abc9c" opacity="0.6"/>
  <circle cx="420" cy="520" r="5" fill="#1abc9c" opacity="0.6"/>
  
  <!-- Title -->
  <text x="600" y="435" text-anchor="middle" fill="url(#titleGrad)" font-size="36" font-weight="bold" font-family="system-ui" filter="url(#glow)">
    UpNote Knowledge Explorer
  </text>
  <text x="600" y="468" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui">
