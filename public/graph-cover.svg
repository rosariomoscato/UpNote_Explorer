  <text x="300" y="485" text-anchor="middle" fill="#80cbc4" font-size="9" font-family="system-ui">Riflessioni</text>
  
  <!-- Note nodes -->
  <!-- AI Ethics notes -->
  <circle cx="120" cy="260" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="280" cy="270" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="170" cy="340" r="5" fill="#e74c3c" opacity="0.6"/>
  
