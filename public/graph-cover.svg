  <text x="385" y="506" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui">Next.js</text>
  
  <rect x="445" y="490" width="90" height="24" rx="12" fill="#06b6d420" stroke="#06b6d440" stroke-width="1"/>
  <text x="490" y="506" text-anchor="middle" fill="#22d3ee" font-size="10" font-family="system-ui">ShadCN</text>
  
  <rect x="550" y="490" width="90" height="24" rx="12" fill="#a855f720" stroke="#a855f740" stroke-width="1"/>
  <text x="595" y="506" text-anchor="middle" fill="#c084fc" font-size="10" font-family="system-ui">Tailwind</text>
  
  <rect x="655" y="490" width="90" height="24" rx="12" fill="#f39c1220" stroke="#f39c1240" stroke-width="1"/>
  <text x="700" y="506" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui">AI / RAG</text>
  
  <rect x="760" y="490" width="90" height="24" rx="12" fill="#2ecc7120" stroke="#2ecc7140" stroke-width="1"/>
  <text x="805" y="506" text-anchor="middle" fill="#66bb6a" font-size="10" font-family="system-ui">vis.js</text>
